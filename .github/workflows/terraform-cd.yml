name: Terraform CD

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        type: choice
        options:
          - apply
          - destroy
        default: apply

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug OIDC token claims
        run: |
          IDTOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo "$IDTOKEN" | cut -d '.' -f2 | base64 -d 2>/dev/null | jq .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: "arn:aws:iam::485646919618:role/OrbitClusterEKSAdmin"
          role-session-name: githubactions-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init

      - name: Terraform plan (apply)
        if: inputs.action == 'apply'
        run: terraform plan -out=tfplan

      - name: Terraform plan (destroy)
        if: inputs.action == 'destroy'
        run: terraform plan -destroy -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  approval:
    name: Manual approval
    needs: plan
    runs-on: ubuntu-latest

    steps:
      - name: Wait for approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: dilip-samanta
          minimum-approvals: 1
          issue-title: "Terraform ${{ inputs.action }} approval - run #${{ github.run_number }}"
          issue-body: |
            Review the plan output in the `plan` job of this workflow run before approving.

            Action requested: **${{ inputs.action }}**

  apply:
    name: Terraform ${{ inputs.action }}
    needs: approval
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.OC_ROLE_TO_ASSUME }}
          role-session-name: githubactions-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform apply
        run: terraform apply tfplan
